<!doctype html>
<html lang="es" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EN DOS Studio · Stickers personalizados</title>
    <meta name="description" content="Sube tu diseño y conviértelo en stickers PRO. Recorte automático, relieve y acabados premium." />

    <!-- OpenCV.js is intentionally NOT loaded here.
         The bundle is ~10 MB and the WASM compile blocks the main thread
         hard enough on first visit that Chrome can mark the renderer as
         hung (RESULT_CODE_HUNG). useOpenCV.ts injects the script tag
         lazily — only when the editor route opens AND only after the
         page has rendered. Pages that don't need OpenCV (home, login,
         dashboard, upload, order-config, checkout, confirmation) never
         pay the cost. -->
  </head>
  <body class="h-full bg-bg text-text antialiased">
    <div id="app" class="min-h-full"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
