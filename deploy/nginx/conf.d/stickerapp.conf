# =============================================================================
# StickerApp nginx config. Lives at /opt/stickerapp/nginx/conf.d/ on the VPS.
#
# Single domain serves:
#   /                 → Vue SPA static (from /usr/share/nginx/html, the
#                       bind-mount of frontend/dist; SPA fallback to index.html)
#   /api/             → Django gunicorn (web:8000)
#   /django-admin/    → Django admin (web:8000)
#   /static/, /media/ → Django collected static + user uploads
#   /tienda/          → WordPress (wordpress:80) — existing WP install
#
# Replace `stickerapp.example.com` with the real domain before reload.
# =============================================================================

# Auth rate limit zone. 10 req/s per IP, burst 20.
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;

# ---- HTTP : 80 → 301 https, but ACME challenges served plain -----------------
server {
    listen 80;
    listen [::]:80;
    server_name stickerapp.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS : 443 -------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stickerapp.example.com;

    ssl_certificate     /etc/letsencrypt/live/stickerapp.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stickerapp.example.com/privkey.pem;

    # Modern TLS only.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Hardening headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP loose enough for Stripe.js + Elements iframes.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com; worker-src 'self' blob:;" always;

    # File upload ceiling: frontend caps at 25MB, allow headroom.
    client_max_body_size 30M;

    # ---- Django API --------------------------------------------------------
    location /api/v1/auth/ {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://web:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Smart-cut cold start can take 30-40s on first request after deploy.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ---- Django admin ------------------------------------------------------
    location /django-admin/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ---- Django collected static + user media ------------------------------
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
        access_log off;
    }

    # ---- WordPress at /tienda (DreamHost VPS, external upstream) -----------
    # WP for endosestudio.com lives on a SEPARATE DreamHost VPS (vps70246),
    # alongside grafitop.com + exonix.eu. We can't put our app on that VPS
    # (DH locks down sudo + docker), so it stays as the WP host.
    #
    # We expose WP via a stable subdomain CNAME the customer controls:
    # `wp.endosestudio.com` → CNAME → vps70246.dreamhostps.com. That way
    # the apex `endosestudio.com` resolves to OUR Hostinger VPS, and our
    # /tienda/ proxy still has a working DH upstream after DNS cutover.
    #
    # WP admin needs a `Better Search Replace` pass to rewrite
    # `https://endosestudio.com/...` → `https://endosestudio.com/tienda/...`
    # in the WP DB once we flip nginx in front. Do this BEFORE cutover.
    location /tienda/ {
        # Resolver needed because we proxy to a public hostname.
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # The DH-served WP upstream. CNAME wp.endosestudio.com to the DH
        # VPS hostname (vps70246.dreamhostps.com) before deploy.
        set $wp_upstream "https://wp.endosestudio.com/";
        proxy_pass $wp_upstream;

        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_set_header Host wp.endosestudio.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WP absolute-URL redirects come back as the upstream domain. Rewrite
        # to /tienda/ so the customer's browser stays on our domain.
        proxy_redirect ~^https?://wp\.endosestudio\.com/(.*)$ /tienda/$1;
    }

    # ---- Vue SPA (root) ----------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        # Hashed asset files are immutable; the index.html itself never caches.
        location ~* \.(?:js|css|woff2?|png|jpe?g|svg|webp)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public, immutable";
        }
    }
}
